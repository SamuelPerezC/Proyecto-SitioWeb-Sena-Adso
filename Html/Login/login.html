<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Calzado Cúcuta Store</title>
    
    <!--iconos-->

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!--estilos-->
    <link rel="stylesheet" href="/Base/reset.css">
    <link rel="stylesheet" href="/Base/variables.css">
    <link rel="stylesheet" href="/Base/base.css">
    <link rel="stylesheet" href="../../Responsive/responsive.css">
    
    <link rel="stylesheet" href="/Css/login.css">
    <link rel="stylesheet" href="/Componentes/botones.css">
    <link rel="stylesheet" href="/Componentes/inputs.css">
    <link rel="stylesheet" href="/Componentes/imagenes.css">

    
</head>
<body>
    <main class="contenedor-acceder">
        <section class="contenedor-mostrar">
            <img src="/Imagenes/Logo_ccs.png" alt="Logo de Calzado Cúcuta Store" class="imagen-mostrar">
        </section>
        <header>
            <h1 class="titulo-mostrar">Bienvenido a Calzado Cúcuta Store</h1>
            <p class="texto-mostrar">Inicia sesión para acceder a tu cuenta</p>
        </header>


        <form action="#" class="Formulario-validar">
            <div class="grupo-escribir">

                <label for="usuario" class="label-escribir"> Usuario
                </label>

                <div class="contenedor-input">

                    <i class="fa-regular fa-user icono-mostrar"></i>

                    <input type="text" id="usuario" name="usuario" class="campo-escribir" placeholder="Nombre de Usuario" required>

                </div>
            </div>
            <div class="grupo-escribir">

                <label for="password" class="label-escribir"> Contraseña
                </label>

                <div class="contenedor-input">

                    <i class="fa-solid fa-lock icono-mostrar"></i>

                    <input type="password" id="password" name="password" class="campo-escribir" placeholder="Contraseña" required>

                    <input type="checkbox" onclick="password.type = this.checked ? 'text' : 'password'">

                </div>

            </div>
            
            <div class="contenedor-recuperar">
                <a href="#" class="enlace-recuperar"> ¿Olvidaste tu contraseña? </a>
            </div>

            <button type="submit" class="boton-ingresar"> Iniciar Sesión </button>
        </form>
    </main>
</body>
</html>
